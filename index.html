<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד ניתוח נתונים | שניר ומיכל</title>
    <script src="https://public.tableau.com/javascripts/api/tableau-2.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/assistant@5.0.19/index.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6C3CE1;
            --primary-light: #8B5CF6;
            --secondary: #F59E0B;
            --dark: #1E1B4B;
            --darker: #0F0A2E;
            --light: #F8F7FF;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --gradient-1: linear-gradient(135deg, #6C3CE1 0%, #A855F7 50%, #EC4899 100%);
            --gradient-2: linear-gradient(135deg, #0F0A2E 0%, #1E1B4B 50%, #312E81 100%);
            --gradient-3: linear-gradient(135deg, #F59E0B 0%, #EF4444 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--darker);
            color: #E2E0F0;
            overflow-x: hidden;
            line-height: 1.8;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-animation .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .bg-animation .orb:nth-child(1) { width: 600px; height: 600px; background: var(--primary); top: -200px; right: -200px; animation-delay: 0s; }
        .bg-animation .orb:nth-child(2) { width: 400px; height: 400px; background: #EC4899; bottom: -100px; left: -100px; animation-delay: -7s; }
        .bg-animation .orb:nth-child(3) { width: 300px; height: 300px; background: var(--secondary); top: 50%; left: 50%; animation-delay: -14s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -80px) scale(1.1); }
            50% { transform: translate(-30px, 60px) scale(0.9); }
            75% { transform: translate(70px, 30px) scale(1.05); }
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .content { position: relative; z-index: 2; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 1rem 2rem;
            backdrop-filter: blur(20px);
            background: rgba(15, 10, 46, 0.7);
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        nav.scrolled { padding: 0.7rem 2rem; background: rgba(15, 10, 46, 0.9); }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.3rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: #C4C1D6; text-decoration: none; font-weight: 500; position: relative; padding-bottom: 4px; }
        .nav-links a:hover { color: #fff; }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem 4rem;
            text-align: center;
        }

        .hero h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem; }
        .hero h1 .gradient-text { background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Dashboard Section */
        .dashboard { padding: 6rem 2rem; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }

        .tableau-wrapper {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .tableau-header {
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
        }

        .window-dots { display: flex; gap: 6px; }
        .window-dots span { width: 12px; height: 12px; border-radius: 50%; }
        .window-dots span:nth-child(1) { background: #EF4444; }
        .window-dots span:nth-child(2) { background: #F59E0B; }
        .window-dots span:nth-child(3) { background: #10B981; }

        .tableau-body { padding: 1.5rem; background: #fff; min-height: 700px; position: relative; }
        #tableauViz { width: 100%; height: 700px; margin: 0 auto; }

        /* Sections & Cards Styles - Shortened for brevity while keeping the UI */
        .stats, .about, .benefits, .charts-info, .credit { padding: 4rem 2rem; }
        .stats-grid, .about-grid, .benefits-grid, .charts-grid { max-width: 1100px; margin: 0 auto; display: grid; gap: 1.5rem; }
        .stats-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
        
        .stat-card, .about-card, .benefit-item, .chart-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.4s ease;
        }

        /* Footer */
        footer { padding: 3rem 2rem; border-top: 1px solid var(--glass-border); text-align: center; }

        /* Animations */
        .fade-in { opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            #tableauViz { height: 500px; }
            .tableau-body { min-height: 500px; }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="orb"></div><div class="orb"></div><div class="orb"></div>
    </div>
    <canvas id="particles"></canvas>

    <div class="content">
        <nav id="navbar">
            <div class="nav-container">
                <div class="nav-logo">שניר & מיכל</div>
                <ul class="nav-links">
                    <li><a href="#home">דף הבית</a></li>
                    <li><a href="#about">אודות</a></li>
                    <li><a href="#dashboard">הדשבורד</a></li>
                    <li><a href="#credit">קרדיט</a></li>
                </ul>
            </div>
        </nav>

        <section class="hero" id="home">
            <div class="hero-inner">
                <h1>תובנות עסקיות<br><span class="gradient-text">במבט אחד</span></h1>
                <p>פלטפורמת ניתוח נתונים אינטראקטיבית מבוססת Tableau</p>
            </div>
        </section>

        <section class="dashboard" id="dashboard">
            <div class="dashboard-container">
                <div class="tableau-wrapper fade-in">
                    <div class="tableau-header">
                        <div class="window-dots"><span></span><span></span><span></span></div>
                        <span style="color: #A8A5C0; font-size: 0.9rem;">Live Analysis Dashboard</span>
                    </div>
                    <div class="tableau-body">
                        <div id="tableauViz"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="credit" id="credit">
            <div style="text-align: center;" class="fade-in">
                <h3>האתר פותח על ידי מר שניר וגברת מיכל</h3>
                <p>© 2024 כל הזכויות שמורות</p>
            </div>
        </section>

        <footer>
            <p>מופעל באמצעות Tableau Public &middot; מתארח ב-GitHub Pages</p>
        </footer>
    </div>

    <script>
        /**
         * פונקציית הטמעת Tableau מתוקנת
         */
        function initViz() {
            var containerDiv = document.getElementById("tableauViz");
            
            // שימוש ב-URL נקי ללא פרמטרי auth
            var url = "https://public.tableau.com/views/SnirMichalDashboard/SnirMichalDashboard";
            
            var options = {
                hideTabs: true,
                hideToolbar: true, // שינוי ל-true לרוב פותר בעיות גלילה ב-GitHub Pages
                width: "100%",
                height: "100%",
                onFirstInteractive: function () {
                    console.log("Tableau Viz has finished loading.");
                }
            };

            // הוספת פרמטרים של Tableau Public להטמעה נקייה
            url += "?:embed=yes&:showVizHome=no&:display_count=yes&:toolbar=no";

            // ניקוי הקונטיינר לפני טעינה (למניעת כפילויות)
            containerDiv.innerHTML = "";
            
            try {
                var viz = new tableau.Viz(containerDiv, url, options);
            } catch (e) {
                console.error("Tableau initialization failed:", e);
            }
        }

        // טעינת הדשבורד
        window.onload = initViz;

        // אנימציות חשיפה (Fade In)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // Particle background logic (simplified)
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<50; i++) {
            particles.push({
                x: Math.random()*canvas.width, 
                y: Math.random()*canvas.height,
                vx: Math.random()-0.5, 
                vy: Math.random()-0.5
            });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(139, 92, 246, 0.3)';
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
